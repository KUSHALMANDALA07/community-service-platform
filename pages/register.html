<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Community Help Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="d-flex align-items-center min-vh-100 py-5" style="background: linear-gradient(135deg, rgba(46,139,87,0.1), rgba(76,175,80,0.15));">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-6">
        <div class="glass-card p-4 p-md-5 shadow-lg rounded-4 text-center">
          
          <a href="../index.html" class="text-decoration-none d-inline-block mb-2">
            <div class="stat-icon mx-auto mb-1"><i class="fas fa-hand-holding-heart"></i></div>
            <h4 class="fw-bold text-primary mb-0">Community Help Hub</h4>
          </a>

          <h5 class="fw-bold mb-1">Create an Account</h5>
          <p class="text-muted small mb-4">Join as a Citizen, Volunteer, NGO Partner, or Admin.</p>

          <!-- ROLE SELECTOR TABS -->
          <ul class="nav nav-pills nav-justified mb-4 glass-card p-1" id="roleTab" role="tablist">
            <li class="nav-item"><button class="nav-link active btn-sm py-2 fw-semibold" data-bs-toggle="pill" data-bs-target="#citizenRole">Citizen</button></li>
            <li class="nav-item"><button class="nav-link btn-sm py-2 fw-semibold" data-bs-toggle="pill" data-bs-target="#volunteerRole">Volunteer</button></li>
            <li class="nav-item"><button class="nav-link btn-sm py-2 fw-semibold" data-bs-toggle="pill" data-bs-target="#ngoRole">NGO</button></li>
            <li class="nav-item"><button class="nav-link btn-sm py-2 fw-semibold" data-bs-toggle="pill" data-bs-target="#adminRole">Admin</button></li>
          </ul>

          <div class="tab-content" id="roleTabContent">
            
            <div class="tab-pane fade show active" id="citizenRole">
              <form class="reg-form text-start">
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Full Name</label>
                  <input type="text" class="form-control form-control-custom" placeholder="e.g. Ramesh Kumar" required>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Email Address</label>
                  <input type="email" class="form-control form-control-custom" placeholder="ramesh@example.com" required>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Password</label>
                  <input type="password" class="form-control form-control-custom" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 py-2.5 fw-bold mt-2"><i class="fas fa-user-plus me-2"></i> Register as Citizen</button>
              </form>
            </div>

            <div class="tab-pane fade" id="volunteerRole">
              <div class="p-3 text-center">
                <p class="text-muted small">Volunteers gain access to volunteer hours tracking and certificates.</p>
                <a href="volunteer.html" class="btn btn-primary-custom w-100 py-2.5 fw-bold"><i class="fas fa-hands-helping me-2"></i> Open Full Volunteer Registration</a>
              </div>
            </div>

            <div class="tab-pane fade" id="ngoRole">
              <form class="reg-form text-start">
                <div class="mb-3">
                  <label class="form-label fw-semibold small">NGO Organization Name</label>
                  <input type="text" class="form-control form-control-custom" placeholder="e.g. Hope Welfare Foundation" required>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Registration Code / License No.</label>
                  <input type="text" class="form-control form-control-custom" placeholder="NGO-REG-98765" required>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Official Email</label>
                  <input type="email" class="form-control form-control-custom" placeholder="contact@hopewelfare.org" required>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 py-2.5 fw-bold mt-2"><i class="fas fa-building me-2"></i> Register NGO Account</button>
              </form>
            </div>

            <div class="tab-pane fade" id="adminRole">
              <form class="reg-form text-start">
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Admin Security Passcode</label>
                  <input type="password" class="form-control form-control-custom" placeholder="Enter CHH Admin Security Key" required>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 py-2.5 fw-bold mt-2"><i class="fas fa-user-shield me-2"></i> Register Admin Access</button>
              </form>
            </div>

          </div>

          <p class="text-muted small mb-0 mt-4">
            Already have an account? <a href="login.html" class="text-primary fw-bold text-decoration-none">Log In Here</a>
          </p>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    document.querySelectorAll('.reg-form').forEach(form => {
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        alert('Verification code sent! Account created. Redirecting to your User Portal...');
        window.location.href = '../user/index.html';
      });
    });
  </script>
</body>
</html>
