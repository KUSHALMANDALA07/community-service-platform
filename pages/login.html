<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Community Help Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="d-flex align-items-center min-vh-100 py-5" style="background: linear-gradient(135deg, rgba(46,139,87,0.1), rgba(76,175,80,0.15));">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="glass-card p-4 p-md-5 shadow-lg rounded-4 text-center">
          
          <a href="../index.html" class="text-decoration-none d-inline-block mb-3">
            <div class="stat-icon mx-auto mb-2"><i class="fas fa-hand-holding-heart"></i></div>
            <h4 class="fw-bold text-primary mb-0">Community Help Hub</h4>
          </a>

          <h5 class="fw-bold mb-1">Welcome Back</h5>
          <p class="text-muted small mb-4">Sign in to manage your requests and volunteer portal.</p>

          <form id="login-form">
            <div class="mb-3 text-start">
              <label class="form-label fw-semibold small">Email Address</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                <input type="email" class="form-control form-control-custom border-start-0" placeholder="user@example.com" required>
              </div>
            </div>

            <div class="mb-3 text-start">
              <label class="form-label fw-semibold small">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-lock text-muted"></i></span>
                <input type="password" class="form-control form-control-custom border-start-0" placeholder="••••••••" required>
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 small">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label text-muted" for="rememberMe">Remember me</label>
              </div>
              <a href="#" class="text-primary text-decoration-none fw-semibold" onclick="alert('Password reset link sent to your registered email!');">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 py-2.5 mb-3 fw-bold"><i class="fas fa-sign-in-alt me-2"></i> Log In</button>
            
            <button type="button" class="btn btn-outline-secondary w-100 py-2.5 mb-4 rounded-pill small" onclick="alert('Google SSO Simulated Authentication Successful!'); window.location.href='../admin/volunteer-dashboard.html';">
              <i class="fab fa-google text-danger me-2"></i> Continue with Google
            </button>
          </form>

          <p class="text-muted small mb-0">
            Don't have an account? <a href="register.html" class="text-primary fw-bold text-decoration-none">Register Here</a>
          </p>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Login successful! Redirecting to Admin & Volunteer Dashboard...');
      window.location.href = '../admin/index.html';
    });
  </script>
  <!-- Vercel Web Analytics -->
  <script src="../assets/js/analytics-bundle.js"></script>
</body>
</html>
