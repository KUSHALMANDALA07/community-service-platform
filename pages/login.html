<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Community Help Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="d-flex align-items-center min-vh-100 py-5" style="background: linear-gradient(135deg, rgba(46,139,87,0.1), rgba(76,175,80,0.15));">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="glass-card p-4 p-md-5 shadow-lg rounded-4 text-center">
          
          <a href="../index.html" class="text-decoration-none d-inline-block mb-3">
            <div class="stat-icon mx-auto mb-2"><i class="fas fa-hand-holding-heart"></i></div>
            <h4 class="fw-bold text-primary mb-0">Community Help Hub</h4>
          </a>

          <h5 class="fw-bold mb-1">Account Sign In</h5>
          <p class="text-muted small mb-4">Enter your login credentials below.</p>

          <form id="login-form">
            <div class="mb-3 text-start">
              <label class="form-label fw-semibold small">Username or Email</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-user text-muted"></i></span>
                <input type="text" id="login-username" class="form-control form-control-custom border-start-0" placeholder="e.g. admin or user@example.com" required>
              </div>
            </div>

            <div class="mb-3 text-start">
              <label class="form-label fw-semibold small">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-lock text-muted"></i></span>
                <input type="password" id="login-password" class="form-control form-control-custom border-start-0" placeholder="••••••••" required>
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 small">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe" checked>
                <label class="form-check-label text-muted" for="rememberMe">Keep me logged in</label>
              </div>
              <a href="#" class="text-primary text-decoration-none fw-semibold" onclick="alert('Password reset instructions sent!');">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 py-2.5 mb-3 fw-bold"><i class="fas fa-sign-in-alt me-2"></i> Log In</button>
            
            <button type="button" class="btn btn-outline-secondary w-100 py-2.5 mb-4 rounded-pill small" onclick="localStorage.setItem('chh_role', 'user'); localStorage.setItem('chh_user', 'Citizen User'); window.location.href='../user/index.html';">
              <i class="fab fa-google text-danger me-2"></i> Continue as General User
            </button>
          </form>

          <p class="text-muted small mb-0">
            Don't have an account? <a href="register.html" class="text-primary fw-bold text-decoration-none">Register Here</a>
          </p>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('login-username').value.trim().toLowerCase();
      const pass = document.getElementById('login-password').value.trim();

      if ((user === 'admin' || user === 'admin@communityhelphub.org') && pass === 'admin123') {
        localStorage.setItem('chh_role', 'admin');
        localStorage.setItem('chh_user', 'Super Admin');
        alert('Welcome Admin! Session saved. Redirecting to Admin Control Center...');
        window.location.href = '../admin/index.html';
      } else {
        localStorage.setItem('chh_role', 'user');
        localStorage.setItem('chh_user', user || 'Citizen User');
        alert('Welcome! Session saved. Redirecting to User Portal...');
        window.location.href = '../user/index.html';
      }
    });
  </script>
</body>
</html>
